<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GlobalMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block bg-dark text-white min-vh-100 p-3">
                <h4 class="text-center mb-4">GlobalMarket Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link text-white bg-primary rounded" href="#">Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Products</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Orders</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Customers</a></li>
                    <li class="nav-item mt-5"><a class="nav-link text-white" href="index.html">← Salir a Tienda</a></li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto p-4 bg-light">
                <h2>Admin Dashboard</h2>
                <hr>
                <div class="row g-4 mb-5">
                    <div class="col-md-4">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title text-muted">Total Sales</h5>
                                <h2 class="text-success">$4,500</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title text-muted">New Orders</h5>
                                <h2 class="text-primary">25</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title text-muted">Active Users</h5>
                                <h2>1,250</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">Recent Orders</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#1001</td>
                                    <td>Juan Pérez</td>
                                    <td>15/03/2026</td>
                                    <td><span class="badge bg-warning text-dark">Pendiente</span></td>
                                </tr>
                                <tr>
                                    <td>#1002</td>
                                    <td>María García</td>
                                    <td>14/03/2026</td>
                                    <td><span class="badge bg-success">Completado</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
