<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalMarket - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/img/logo.png">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand text-warning" href="index.html">GlobalMarket</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">🙍‍♂️ Entrar</a></li>
                    <li class="nav-item"><a class="nav-link" href="productos.html">📖 Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="carrito.html">🛒Carrito</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <a href="index.html" class="btn btn-outline-secondary mb-4">← Volver al inicio</a>
        <div class="row">
            <aside class="col-md-3">
                <h4>Filtros</h4>
                <hr>
                <h5>Categorías</h5>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="cat1">
                    <label class="form-check-label" for="cat1">Electrónica</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="cat2">
                    <label class="form-check-label" for="cat2">Hogar</label>
                </div>
                <hr>
                <h5>Precio</h5>
                <input type="range" class="form-range" min="0" max="1000" id="precioRango">
                <button class="btn btn-sm btn-secondary w-100 mt-3">Aplicar</button>
            </aside>

            <main class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Categoría: Todas</h2>
                    <select class="form-select w-auto">
                        <option>Ordenar por...</option>
                        <option>Menor a mayor precio</option>
                        <option>Mayor a menor precio</option>
                    </select>
                </div>
                <div class="row g-4" id="catalogo-grid">
                    <div class="col-md-4">
                        <div class="card h-100">
                            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Producto">
                            <div class="card-body text-center">
                                <h5 class="card-title">Producto Ejemplo</h5>
                                <p class="card-text fw-bold">$19.99</p>
                                <a href="producto-detalle.html" class="btn btn-primary w-100">Comprar</a>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
